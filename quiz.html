<head>

<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">

<title>Interactive Q&amp;A  -  PawSafe</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--cream:#f1e9da;--ink:#2a3025;--rust:#63a46c;--moss:#45503b;--ochre:#d4a040;--paper:#f7f1e3}
*{margin:0;padding:0;box-sizing:border-box}
html{scrollbar-gutter:stable}body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--ink);line-height:1.6;min-height:100vh}
h1,h2,h3{font-family:'Fraunces',serif;font-weight:600;letter-spacing:-.02em}
nav{display:flex;justify-content:space-between;align-items:center;padding:1.2rem 2.5rem;flex-wrap:nowrap;border-bottom:1px solid rgba(26,26,26,.15);background:var(--paper);position:sticky;top:0;z-index:100}
.logo{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:800}
.logo span{color:var(--rust)}
nav ul{display:flex;gap:1.5rem;list-style:none;align-items:center;flex-wrap:nowrap}
nav a{color:var(--ink);text-decoration:none;font-size:.85rem;font-weight:500;white-space:nowrap}
nav a:hover{color:var(--rust)}
.wrap{max-width:780px;margin:0 auto;padding:4rem 2rem}
.label{font-size:.75rem;text-transform:uppercase;letter-spacing:.2em;color:var(--moss);margin-bottom:1rem}
h1{font-size:3rem;margin-bottom:1rem}
.intro{color:#555;font-size:1.1rem;margin-bottom:3rem}
.progress{height:6px;background:rgba(0,0,0,.08);border-radius:10px;overflow:hidden;margin-bottom:2rem}
.progress-bar{height:100%;background:var(--rust);transition:width .4s}
.qcard{background:var(--paper);padding:3rem;border-radius:24px;border:1px solid rgba(0,0,0,.08);min-height:400px}
.qnum{font-family:'Fraunces',serif;font-size:.9rem;color:var(--moss);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.15em}
.qtext{font-family:'Fraunces',serif;font-size:1.6rem;line-height:1.3;margin-bottom:2rem}
.options{display:flex;flex-direction:column;gap:.8rem}
.opt{padding:1.2rem 1.5rem;background:var(--cream);border:2px solid transparent;border-radius:12px;cursor:pointer;transition:all .2s;text-align:left;font-size:1rem;font-family:inherit;color:var(--ink)}
.opt:hover{border-color:var(--ink)}
.opt.correct{background:#d4e7c5;border-color:var(--moss)}
.opt.wrong{background:#e8c9b8;border-color:#8b5a3c}
.opt:disabled{cursor:default}
.feedback{margin-top:1.5rem;padding:1.2rem;border-radius:12px;background:var(--cream);border-left:4px solid var(--ochre);display:none}
.feedback.show{display:block}
.feedback strong{font-family:'Fraunces',serif}
.next-btn{margin-top:1.5rem;padding:.9rem 2rem;background:var(--ink);color:var(--paper);border:none;border-radius:50px;font-family:inherit;font-weight:500;cursor:pointer;font-size:.95rem;display:none}
.next-btn.show{display:inline-block}
.results{text-align:center;padding:3rem}
.score{font-family:'Fraunces',serif;font-size:5rem;color:var(--rust);font-weight:800}
.results h2{font-size:2rem;margin:1rem 0}
.results p{color:#666;margin-bottom:2rem}
.results button{padding:1rem 2rem;background:var(--ink);color:var(--paper);border:none;border-radius:50px;font-family:inherit;cursor:pointer;font-size:.95rem}
@media(max-width:700px){nav{padding:1rem 1.5rem;flex-direction:column;gap:.8rem}nav ul{gap:1.2rem;flex-wrap:wrap;justify-content:center}.wrap{padding:2rem 1rem}.qcard{padding:1.8rem}.qtext{font-size:1.3rem}}

html.dark{--cream:#1e2420;--ink:#f1e9da;--paper:#2a3025;--moss:#8bb088}
html.dark body{background:var(--cream);color:var(--ink)}
html.dark nav{background:#252b24;border-bottom-color:rgba(255,255,255,.1)}
html.dark .card,html.dark .qcard,html.dark .board,html.dark .toc,html.dark .placeholder,html.dark .face.front{background:var(--paper);border-color:rgba(255,255,255,.1)}
html.dark .opt,html.dark .pool,html.dark .bin,html.dark .score-row,html.dark .statement,html.dark .mf-btns button,html.dark .habit{background:#252b24;color:var(--ink)}
html.dark .hero-visual{background:radial-gradient(circle at 30% 30%,#8bc48f,#45503b 75%)}
html.dark .refs,html.dark .byline,html.dark .hero p,html.dark .intro,html.dark .feature p,html.dark .card p,html.dark .board>p{color:#b5b0a0}
html.dark .alert{background:#45503b}


/* === PAGE LOAD ANIMATIONS === */
@keyframes paw-fade-up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes paw-fade-in{from{opacity:0}to{opacity:1}}
@keyframes paw-pulse{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes paw-slide-down{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes paw-shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

.hero > div > *,.hero-head > *,.wrap > .label,.wrap > h1,.wrap > .intro,.wrap > .byline{animation:paw-fade-up .8s cubic-bezier(.2,.8,.3,1) both}
.wrap > .label{animation-delay:.1s}
.wrap > h1{animation-delay:.2s}
.wrap > .byline,.wrap > .intro{animation-delay:.3s}
.hero > div > .hero-tag{animation-delay:.15s}
.hero > div > h1{animation-delay:.25s}
.hero > div > p{animation-delay:.35s}
.hero > div > .btn{animation-delay:.45s}
.hero-visual{animation:paw-fade-in 1s ease-out .5s both}
.paw-reveal{opacity:0;transform:translateY(30px);transition:opacity .7s cubic-bezier(.2,.8,.3,1),transform .7s cubic-bezier(.2,.8,.3,1)}
.paw-reveal.in{opacity:1;transform:translateY(0)}
.card,.rcard,.aud,.badge,.qcard,.case,.hotline,.questions,.stat,.board,.toc a{transition:transform .35s cubic-bezier(.2,.8,.3,1),box-shadow .35s ease,border-color .35s ease}
.card:hover,.rcard:hover{box-shadow:0 12px 30px rgba(0,0,0,.1)}
.stat:hover h2{transform:scale(1.05)}
.stat h2{transition:transform .35s cubic-bezier(.2,.8,.3,1);display:inline-block}
.btn,.email-btn,.gtab,.tab,.reset,.mf-btns button,.next-btn,.opt{transition:transform .2s cubic-bezier(.2,.8,.3,1),background .25s ease,color .25s ease,border-color .25s ease,box-shadow .25s ease}
.btn:hover,.email-btn:hover{box-shadow:0 6px 20px rgba(0,0,0,.15)}
.btn:active,.email-btn:active,.gtab:active,.mf-btns button:active{transform:scale(.97)}
.card .inner,#flashcard > div{transition:transform .7s cubic-bezier(.4,0,.2,1)}
.opt.correct{animation:paw-pulse .5s ease-out}
.opt.wrong{animation:paw-shake .4s ease-out}
.progress-bar{transition:width .6s cubic-bezier(.2,.8,.3,1)!important}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}


/* Dark mode button/text overrides */
html.dark .btn{background:#f1e9da;color:#1e2420}
html.dark .btn.alt{background:transparent;color:#f1e9da;border-color:#f1e9da}
html.dark .opt{background:#1e2420;color:#f1e9da;border-color:transparent}
html.dark .opt:hover{border-color:#8bb088}
html.dark .opt.correct{background:#3d5a3a;color:#f1e9da;border-color:#63a46c}
html.dark .opt.wrong{background:#5a3d2a;color:#f1e9da;border-color:#8b5a3c}
html.dark .mf-btns button{background:#1e2420;color:#f1e9da;border-color:#f1e9da}
html.dark .mf-btns button:hover:not(:disabled){background:#f1e9da;color:#1e2420}
html.dark .mf-btns button.right{background:#3d5a3a;color:#f1e9da;border-color:#63a46c}
html.dark .mf-btns button.wrongbtn{background:#5a3d2a;color:#f1e9da;border-color:#8b5a3c}
html.dark .gtab,html.dark .tab{color:#f1e9da;border-color:#f1e9da}
html.dark .gtab.active,html.dark .tab.active{background:#f1e9da;color:#1e2420}
html.dark .habit{background:#1e2420;color:#f1e9da;border-color:#f1e9da}
html.dark .habit.correct{background:#3d5a3a;border-color:#63a46c}
html.dark .habit.wrong{background:#5a3d2a;border-color:#8b5a3c}
html.dark .reset,html.dark .next-btn,html.dark .email-btn{background:#f1e9da;color:#1e2420}
html.dark .hotline .num{color:#f1e9da}
html.dark .questions li::before{color:#8bb088}
html.dark .toc a{background:#1e2420;color:#f1e9da}
html.dark .toc a:hover{border-color:#8bb088}
html.dark .pool{background:#1e2420}
html.dark .statement{background:#1e2420;color:#f1e9da}
html.dark .mf-explain{background:#3d4a3a;color:#f1e9da}
html.dark .case .lesson{background:#1e2420;color:#f1e9da}
html.dark footer{background:#0f1210}
html.dark .back .num,html.dark .results button{background:#f1e9da;color:#1e2420}
html.dark .rcard a,html.dark .sources a,html.dark .card a{color:#8bb088}
html.dark .hero-tag{background:#8bb088;color:#1e2420}
html.dark h1 em,html.dark .logo span{color:#8bb088}
html.dark .label{color:#8bb088}
html.dark input,html.dark textarea,html.dark select{background:#1e2420;color:#f1e9da;border-color:#f1e9da}

</style>
</head>

<div class="wrap">
  <p class="label"> -  Test Your Knowledge</p>
  <h1>Interactive Q&amp;A</h1>
  <p class="intro">Real scenarios from everyday pet ownership. Choose the safest answer and learn why it matters.</p>
  <div class="progress"><div class="progress-bar" id="bar"></div></div>
  <div id="quiz"></div>
</div>

<script>
const questions=[
{q:"Your cat just used the litter box. When is hand-washing most important?",opts:["Only if you touched the waste directly","Every time you scoop or change litter","Just once a day is fine","Only if the cat is sick"],correct:1,explain:"Cat feces can carry Toxoplasma gondii, especially dangerous for pregnant people and those with weakened immune systems. Wash hands every time you handle litter  -  and pregnant individuals should ideally avoid scooping altogether."},
{q:"Your dog licks your face right after eating from their bowl. What's the safest response?",opts:["It's fine  -  dogs' mouths are 'cleaner' than humans'","Gently discourage face-licking, especially near mouth/eyes","Only worry if your dog eats raw food","Wipe with a tissue and move on"],correct:1,explain:"The 'clean dog mouth' idea is a myth. Dogs can transmit bacteria like Capnocytophaga, Salmonella, and Pasteurella through saliva. Discourage licking on the face, especially around the mouth, eyes, and any open wounds."},
{q:"You found a tick on your dog. What should you do FIRST?",opts:["Burn it off with a match","Squeeze it with your fingers","Remove with fine-tipped tweezers, pulling straight up","Wait and see if it falls off"],correct:2,explain:"Use fine-tipped tweezers to grasp the tick close to the skin and pull straight up with steady pressure. Never crush, burn, or twist it  -  this can cause it to release more pathogens. Wash hands and the bite site afterward, and watch for symptoms in both pet and people."},
{q:"Which raw pet food practice creates the highest zoonotic risk?",opts:["Storing raw food in the freezer","Using the same cutting board for raw pet food and human food","Feeding raw food in a stainless steel bowl","Buying commercially frozen raw food"],correct:1,explain:"Cross-contamination is the biggest risk. Raw meat  -  even pet-grade  -  can carry Salmonella, E. coli, and Listeria. Use dedicated utensils and surfaces, and disinfect thoroughly after every use."},
{q:"When should you take a pet scratch or bite seriously enough to see a doctor?",opts:["Only if it's bleeding heavily","If it breaks the skin, especially on hands or face","Never  -  pet wounds heal on their own","Only if you don't know the animal"],correct:1,explain:"Any bite or scratch that breaks the skin can introduce bacteria. Seek medical care if the wound is deep, on the hand or face, won't stop bleeding, shows redness/swelling, or if your tetanus shot is out of date. Cat bites in particular have high infection rates."},
{q:"What's the best way to reduce zoonotic risk from a new pet reptile?",opts:["Bathe it weekly with soap","Never handle it without washing hands after","Keep it in the kitchen for warmth","Let young children play with it freely"],correct:1,explain:"Reptiles and amphibians naturally carry Salmonella on their skin  -  even healthy ones. Always wash hands after handling, keep enclosures out of kitchens, and the CDC recommends children under 5, pregnant people, and immunocompromised individuals avoid direct contact."}
];

let cur=0,score=0;
const quiz=document.getElementById('quiz'),bar=document.getElementById('bar');

function render(){
  if(cur>=questions.length){
    const pct = score/questions.length;
    let title, msg;
    if(pct===1){ title='Perfect score!'; msg='You nailed every question. You are a zoonotic prevention pro.'; if(window.PawBadges)PawBadges.earn('quiz'); }
    else if(pct>=.8){ title='So close!'; msg='Just one or two off. Review the prevention page and try again for a perfect badge.'; }
    else if(pct>=.5){ title='You are almost there.'; msg='Halfway is a solid start. Read the articles and come back for another run.'; }
    else { title='Keep learning.'; msg='This one takes practice. Check the prevention toolkit, then try again.'; }
    quiz.innerHTML=`<div class="qcard results"><div class="score">${score}/${questions.length}</div><h2>${title}</h2><p>${msg}</p><p style="font-size:.8rem;color:#888;margin-top:.5rem">${pct===1?'Badge earned.':'Perfect score required to earn the badge.'}</p><button onclick="cur=0;score=0;render()">Try Again</button></div>`;
    bar.style.width='100%';return;
  }
  bar.style.width=((cur)/questions.length*100)+'%';
  const q=questions[cur];
  quiz.innerHTML=`<div class="qcard"><div class="qnum">Question ${cur+1} of ${questions.length}</div><div class="qtext">${q.q}</div><div class="options">${q.opts.map((o,i)=>`<button class="opt" data-i="${i}">${o}</button>`).join('')}</div><div class="feedback" id="fb"><strong>Why:</strong> ${q.explain}</div><button class="next-btn" id="nx">Next →</button></div>`;
  document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>pick(parseInt(b.dataset.i)));
  document.getElementById('nx').onclick=()=>{cur++;render()};
}
function pick(i){
  const q=questions[cur];
  document.querySelectorAll('.opt').forEach((b,idx)=>{b.disabled=true;if(idx===q.correct)b.classList.add('correct');else if(idx===i)b.classList.add('wrong')});
  if(i===q.correct)score++;
  document.getElementById('fb').classList.add('show');
  document.getElementById('nx').classList.add('show');
}
render();
</script>
